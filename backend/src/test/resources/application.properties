spring.application.name=db-library

# Database configuration is auto-configured by Testcontainers @ServiceConnection

# Liquibase Configuration - Use migrations to create schema
spring.liquibase.enabled=true

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Hibernate Envers Configuration
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_aud
spring.jpa.properties.org.hibernate.envers.revision_field_name=rev
spring.jpa.properties.org.hibernate.envers.revision_type_field_name=revtype

# CSV Data Import Configuration - DISABLED for tests
app.data.import.enabled=false
app.csv.book-template-filename=book_upload_template.csv

# JWT Configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D6351}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Materialized View Refresh Schedules - DISABLED for tests (invalid cron to prevent execution)
app.scheduler.mv-book-recommendations=-
app.scheduler.mv-genre-statistics=-
app.scheduler.mv-top-books-monthly=-
app.scheduler.mv-top-books-weekly=-

# Spring Scheduling - Enable for scheduler beans but tests won't trigger scheduled tasks
spring.task.scheduling.enabled=true