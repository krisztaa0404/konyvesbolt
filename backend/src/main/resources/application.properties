spring.application.name=db-library

# Database Connection
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bookshop_db}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# Liquibase Configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Hibernate Envers Configuration
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_aud
spring.jpa.properties.org.hibernate.envers.revision_field_name=rev
spring.jpa.properties.org.hibernate.envers.revision_type_field_name=revtype

# CSV Data Import Configuration
app.data.import.enabled=false
app.csv.book-template-filename=book_upload_template.csv

# Stock Configuration
app.stock.low-threshold=10

# JWT Configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D6351}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Materialized View Refresh Schedules (Cron format: second minute hour day month weekday)
app.scheduler.mv-book-recommendations=0 0 2 * * *
app.scheduler.mv-genre-statistics=0 0 3 * * *
app.scheduler.mv-top-books-monthly=0 0 4 * * *
app.scheduler.mv-top-books-weekly=0 0 * * * *

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
