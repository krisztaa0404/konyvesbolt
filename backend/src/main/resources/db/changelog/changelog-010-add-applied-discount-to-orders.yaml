databaseChangeLog:
  - changeSet:
      id: 010-add-applied-discount-to-orders
      author: krisztinavasas
      changes:
        - sqlFile:
            path: db/changelog/sql/010-add-applied-discount-to-orders.sql
            relativeToChangelogFile: false
            splitStatements: true
            stripComments: false
      rollback:
        - sql:
            sql: |
              ALTER TABLE orders DROP CONSTRAINT IF EXISTS fk_orders_applied_discount;
              ALTER TABLE orders DROP COLUMN IF EXISTS applied_discount_id;
              ALTER TABLE orders_aud DROP COLUMN IF EXISTS applied_discount_id;
